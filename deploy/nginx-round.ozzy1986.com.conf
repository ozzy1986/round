# Nginx site for Round API (VPS: round.ozzy1986.com)
# HTTP on 8080; HTTPS on 443 (after certbot: certbot certonly --webroot -w /var/www/html -d round.ozzy1986.com).
# Symlink to /etc/nginx/sites-enabled/ and reload nginx:
#   sudo ln -sf /var/www/round.ozzy1986.com/deploy/nginx-round.ozzy1986.com.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 8080;
    server_name round.ozzy1986.com;
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 443 ssl;
    server_name round.ozzy1986.com;
    ssl_certificate /etc/letsencrypt/live/round.ozzy1986.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/round.ozzy1986.com/privkey.pem;
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
