# Nginx site for Round API (VPS: round.ozzy1986.com)
# Nginx listens on 8080; Apache keeps 80.
# Symlink to /etc/nginx/sites-enabled/ and reload nginx:
#   sudo ln -sf /var/www/round.ozzy1986.com/deploy/nginx-round.ozzy1986.com.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 8080;
    server_name round.ozzy1986.com;
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
