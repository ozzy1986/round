# Nginx site for Round API (VPS: round.ozzy1986.com)
# HTTP on 8080; HTTPS on 443 (after certbot: certbot certonly --webroot -w /var/www/html -d round.ozzy1986.com).
# Symlink to /etc/nginx/sites-enabled/ and reload nginx:
#   sudo ln -sf /var/www/round.ozzy1986.com/deploy/nginx-round.ozzy1986.com.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

upstream round_api {
    server 127.0.0.1:3001;
    keepalive 64;
}

server {
    listen 8080;
    server_name round.ozzy1986.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name round.ozzy1986.com;
    ssl_certificate /etc/letsencrypt/live/round.ozzy1986.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/round.ozzy1986.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_proxied any;
    gzip_types application/json;

    location / {
        proxy_pass http://round_api;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
