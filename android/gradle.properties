android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
android.suppressUnsupportedCompileSdk=36

# Increase memory for Gradle daemon
org.gradle.jvmargs=-Xmx4096m -Dfile.encoding=UTF-8

# Proxy: if direct access to Google Maven is blocked, set proxy in
# ~/.gradle/gradle.properties or via env vars (HTTP_PROXY / HTTPS_PROXY).
# Do not hardcode proxy here — it breaks builds on machines without the proxy.
